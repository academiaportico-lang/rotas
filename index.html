<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Portico - Rotas</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>

<div class="container-header">
  <h1 class="logo-portico">P<span>O</span>RTIC<span>O</span></h1>
  <h2>Portico - Rota de Transportes</h2>
</div>

<div class="container">

  <!-- ORIGEM -->
  <div class="coluna">
    <h3>Origem</h3>

    <input id="cepOrigem" placeholder="CEP">
    <input id="numOrigem" placeholder="Número">

    <button onclick="buscarEndereco()">Buscar</button>

    <input id="origem" placeholder="Endereço" readonly>
  </div>

  <!-- DESTINOS -->
  <div class="coluna">
    <h3>Destinos</h3>

    <div id="destinos"></div>

    <div class="add-destino" onclick="adicionarDestino()">
      ➕ Adicionar endereço
    </div>
  </div>

  <!-- INFO -->
  <div class="coluna">
    <h3>Informações</h3>

    <button onclick="calcular()">Calcular rota</button>
    <button onclick="novaRota()">Nova rota</button>

    <div id="resultado"></div>
  </div>

</div>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <p>Calculando rota...</p>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="rota.js"></script>

</body>
</html>
